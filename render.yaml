services:
  - type: web
    name: blip-chat
    runtime: python
    region: singapore          # Closest to Philippines 🇵🇭
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true    # Render auto-generates a secure random secret
    healthCheckPath: /
